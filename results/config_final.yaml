lora:
  rank: 64
  alpha: 64
  target_modules:
  - to_q
  - to_k
  - to_v
  - to_out.0
  dropout: 0.0
policy:
  model: /workspace/models/flux-dev
  device: cuda:0
  dtype: bf16
  num_steps: 6
  guidance_scale: 3.5
  height: 512
  width: 512
judger:
  model: /workspace/models/qwen-judge
  device: cuda:0
  quantization: none
  max_new_tokens: 512
prompts:
  dataset: Qwen/Qwen-Image-Bench
  split: test
  language: en
rollout:
  prompts_per_step: 1
  samples_per_prompt: 3
training:
  algorithm: grpo
  total_steps: 10
  lr: 0.0001
  weight_decay: 0.01
  grad_clip: 1.0
  kl_beta: 0.04
  dpo_beta: 0.1
  grpo_clip_eps: 0.2
  sde_noise_scale: 0.15
  gradient_checkpointing: true
  seed: 42
output:
  dir: ./outputs
  save_every: 5
  log_every: 1
  wandb: false
  wandb_project: q-judger-rl
